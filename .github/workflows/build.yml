name: Build Android APK
on: [push, pull_request] # Сборка запускается при каждом пуше

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew :composeApp:assembleDebug # Имя модуля зависит от шаблона (:androidApp или :composeApp)

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: '**/build/outputs/apk/debug/*.apk'

